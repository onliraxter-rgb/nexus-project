name: Deploy NEXUS — Worker + Pages

on:
  push:
    branches: [main]

jobs:
  # ── JOB 1: Deploy Cloudflare Worker (backend) ──────────────────────────
  deploy-worker:
    name: Deploy Backend Worker (v14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "a8e1e29d41a302508f3252d9bed676ce"
          workingDirectory: "backend"

  # ── JOB 2: Deploy Cloudflare Pages (frontend) ──────────────────────────
  deploy-pages:
    name: Deploy Frontend Pages (v12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "a8e1e29d41a302508f3252d9bed676ce"
          command: pages deploy . --project-name=nexus-data-analyst-web --commit-dirty=true
