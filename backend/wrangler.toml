name = "nexus-data-analyst-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "NEXUS_KV"
id = "6c1a280596a8453fa4893dd7de5f7700"

[vars]
FREE_CREDITS = "10"
GOOGLE_CLIENT_ID = "152785926177-ani51o00pe8k7uttjipnheg1mqijvchq.apps.googleusercontent.com"

# ── SECURE SECRETS — Set via Cloudflare Dashboard, NOT here ──
# dash.cloudflare.com → Workers → nexus-data-analyst-api → Settings → Variables & Secrets
# Add as ENCRYPTED secrets (not plain vars):
#   GROQ_API_KEY     = your Groq API key (console.groq.com)
#   GEMINI_API_KEY   = your Gemini key (aistudio.google.com) — optional fallback
#   JWT_SECRET       = any long random string (min 32 chars)
#   ADMIN_SECRET     = your private admin password
